services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quarry
      POSTGRES_PASSWORD: quarry
      POSTGRES_DB: quarry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quarry"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      QUARRY_DATABASE_URL: postgresql+asyncpg://quarry:quarry@db:5432/quarry
      QUARRY_CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      QUARRY_DEBUG: "true"
      QUARRY_GOOGLE_MAPS_API_KEY: "AIzaSyCa5c9Ey7wfcsfGVcwA0-AFsDY8GwV8FZQ"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: "http://api:8000"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npx vite --host 0.0.0.0"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
  node_modules:
