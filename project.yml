name: BirdDog
options:
  bundleIdPrefix: edu.moravian
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  SWIFT_VERSION: "5.9"
  TARGETED_DEVICE_FAMILY: "1,2"
  INFOPLIST_FILE: BirdDog/App/Info.plist
  GENERATE_INFOPLIST_FILE: false
targets:
  BirdDog:
    type: application
    platform: iOS
    sources:
      - path: BirdDog
        excludes:
          - "BirdDog-graphic design-Assets/**"
    resources:
      - path: BirdDog/Resources/Assets.xcassets
      - path: BirdDog/Resources/permits.json
      - path: BirdDog/Resources/lots.json
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: edu.moravian.birddog
      MARKETING_VERSION: "2.0.0"
      CURRENT_PROJECT_VERSION: "1"
      DEVELOPMENT_TEAM: P6D8DZ6BZ7
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SUPPORTED_INTERFACE_ORIENTATIONS: "UIInterfaceOrientationPortrait"
      SUPPORTED_INTERFACE_ORIENTATIONS~ipad: "UIInterfaceOrientationPortrait"

  BirdDogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BirdDogTests
    dependencies:
      - target: BirdDog
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: edu.moravian.birddog.tests
      DEVELOPMENT_TEAM: P6D8DZ6BZ7
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BirdDog.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BirdDog"
      BUNDLE_LOADER: "$(TEST_HOST)"
